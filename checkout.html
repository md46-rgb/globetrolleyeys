<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Checkout - GlobeTrolleyeys</title><script src="https://cdn.tailwindcss.com"></script><script src="https://js.stripe.com/v3/"></script><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"><style>body{font-family:'DM Sans',sans-serif}</style></head><body class="bg-gray-50 min-h-screen"><header class="bg-white border-b py-4 px-6"><div class="max-w-4xl mx-auto flex items-center justify-between"><a href="index.html" class="flex items-center gap-2"><div class="w-8 h-8 bg-orange-500 rounded-lg flex items-center justify-center"><span class="text-white font-bold text-sm">G</span></div><span style="font-family:'Playfair Display',serif;font-weight:700;font-size:1.2rem;">GlobeTrolleyeys</span></a><div class="flex items-center gap-2 text-sm text-gray-500"><svg class="w-4 h-4 text-green-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>256-bit SSL Secured</div></div></header><main class="max-w-4xl mx-auto px-4 py-8"><div class="grid lg:grid-cols-2 gap-8"><div><h1 style="font-family:'Playfair Display',serif;" class="text-2xl font-bold mb-6">Checkout</h1><div class="bg-white rounded-2xl border p-6 mb-4"><h2 class="font-semibold mb-4">Contact Information</h2><div class="space-y-3"><div class="grid grid-cols-2 gap-3"><div><label class="text-xs text-gray-500 mb-1 block">First Name</label><input type="text" id="fname" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-orange-500" placeholder="John"></div><div><label class="text-xs text-gray-500 mb-1 block">Last Name</label><input type="text" id="lname" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-orange-500" placeholder="Smith"></div></div><div><label class="text-xs text-gray-500 mb-1 block">Email</label><input type="email" id="email" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-orange-500" placeholder="john@example.com"></div></div></div><div class="bg-white rounded-2xl border p-6 mb-4"><h2 class="font-semibold mb-4">Shipping Address</h2><div class="space-y-3"><div><label class="text-xs text-gray-500 mb-1 block">Address</label><input type="text" id="address" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-orange-500" placeholder="123 Main Street"></div><div class="grid grid-cols-2 gap-3"><div><label class="text-xs text-gray-500 mb-1 block">City</label><input type="text" id="city" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-orange-500" placeholder="New York"></div><div><label class="text-xs text-gray-500 mb-1 block">ZIP</label><input type="text" id="zip" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-orange-500" placeholder="10001"></div></div><div><label class="text-xs text-gray-500 mb-1 block">Country</label><select id="country" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-orange-500"><option value="US">United States</option><option value="GB">United Kingdom</option></select></div></div></div><button class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 rounded-xl text-lg">Pay Now - Add Stripe Key</button><p class="text-center text-xs text-gray-400 mt-3">Secured by Stripe & PayPal</p></div><div><div class="bg-white rounded-2xl border p-6 sticky top-4"><h2 class="font-semibold mb-4">Order Summary</h2><div id="order-items" class="space-y-3 mb-4 border-b pb-4"><p class="text-gray-400 text-sm text-center py-4">Loading cart...</p></div><div class="space-y-2 text-sm"><div class="flex justify-between font-bold text-base pt-2 border-t"><span>Total</span><span id="summary-total" class="text-orange-500">$0.00</span></div></div></div></div></div></main><script>const cart=JSON.parse(localStorage.getItem('gt-cart')||'[]');const sub=cart.reduce((s,i)=>s+(i.price*i.qty),0);document.getElementById('summary-total').textContent='$'+sub.toFixed(2);document.getElementById('order-items').innerHTML=cart.length?cart.map(i=>'<div class="flex items-center gap-3"><span class="text-2xl">'+i.emoji+'</span><div class="flex-1"><p class="text-sm font-medium">'+i.name+'</p><p class="text-xs text-gray-400">Qty: '+i.qty+'</p></div><span class="font-semibold text-sm">$'+(i.price*i.qty).toFixed(2)+'</span></div>').join(''):'<p class="text-gray-400 text-sm text-center">No items</p>';</script></body></html>
